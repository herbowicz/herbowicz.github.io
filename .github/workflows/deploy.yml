name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ main ] # Adjust to master if your default branch is different

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # Fixes the caching warning by pointing directly to your lockfile location
          cache-dependency-path: frontend/src/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/src

      - name: Build project
        run: npm run build
        working-directory: frontend/src
        env:
          # Craco/CRA sometimes fails on warnings; this ensures the build succeeds
          CI: false 

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Craco/CRA builds output to a folder named 'build' (not 'dist')
          # Depending on your craco.config.js, it will land in frontend/src/build or frontend/build
          path: 'frontend/src/build'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4