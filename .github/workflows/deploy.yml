name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22  # Using stable Node 22
          # Removed the 'cache' and 'cache-dependency-path' lines entirely

      - name: Install dependencies
        # Switched from 'npm ci' to 'npm install' so it doesn't crash without a lockfile
        run: npm install
        working-directory: frontend/src

      - name: Build project
        run: npm run build
        working-directory: frontend/src
        env:
          CI: false 

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Pointed exactly to where Craco drops the production assets
          path: 'frontend/build'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4